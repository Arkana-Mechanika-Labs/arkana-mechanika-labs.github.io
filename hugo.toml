baseURL = "https://arkana-mechanika-labs.github.io/"
languageCode = "en-us"
title = "Darklands Restoration Project"
enableRobotsTXT = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[params]
  description = "AI-assisted reverse engineering of MicroProse Darklands (1992) — documenting the journey toward a full C# reimplementation."

  [params.theme]
    default = "dark"
    displayToggle = true

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.footer]
    enable = true
    displayCopyright = true

[menu]
  [[menu.main]]
    name = "Devlogs"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "File Formats"
    url = "/formats/"
    weight = 20
  [[menu.main]]
    name = "FAQ"
    url = "/faq/"
    weight = 25
  [[menu.main]]
    name = "Tools"
    url = "/tools/"
    weight = 27
  [[menu.main]]
    name = "Sponsor ♥"
    url = "https://github.com/sponsors/Arkana-Mechanika-Studios"
    weight = 30
